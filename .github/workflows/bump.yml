name: Bump version and release

on:
  workflow_dispatch:
    inputs:
      level:
        description: Version bump level
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute bumped version
        id: bump
        run: |
          last_tag=$(git tag --list --sort=-version:refname | grep -E '^v?[0-9]+(\.[0-9]+)*$' | head -1)
          if [ -z "$last_tag" ]; then
            echo "Error: no release tags found matching semver (v?X[.Y[.Z]])"
            exit 1
          fi

          current_version="${last_tag#v}"
          echo "Current version: $current_version"

          IFS='.' read -ra parts <<< "$current_version"

          case "${{ inputs.level }}" in
            major) idx=0 ;;
            minor) idx=1 ;;
            patch) idx=2 ;;
          esac

          # Ensure we have enough components up to the bumped index
          while [ ${#parts[@]} -le $idx ]; do
            parts+=("0")
          done

          parts[$idx]=$((${parts[$idx]} + 1))

          # Zero out lower-order components
          for ((i = idx + 1; i < ${#parts[@]}; i++)); do
            parts[$i]=0
          done

          # Ensure we always emit 3 components (semver-style), filling with zeros
          while [ ${#parts[@]} -lt 3 ]; do
            parts+=("0")
          done

          new_version=$(IFS='.'; echo "${parts[*]}")
          echo "New version: $new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

  release:
    needs: compute-version
    uses: ./.github/workflows/cd.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
    secrets: inherit
