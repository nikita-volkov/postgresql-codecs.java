name: CD

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to publish (e.g., 1.0.0)
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pages: write
      id-token: write

    steps:
      - name: Validate SemVer version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+(\.[0-9]+)+$'
          then
            echo "Error: '${{ inputs.version }}' is not a valid SemVer version (expected e.g. 1.2.3)"
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set version
        run: mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Generate documentation site
        run: mvn site -DskipTests

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: target/site

      - name: Deploy site to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Publish to GitHub Packages
        run: mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit the version update
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Set package version to ${{ inputs.version }}
          file_pattern: pom.xml

      - name: Create GitHub release
        run: gh release create "v${{ inputs.version }}" --title "v${{ inputs.version }}" --generate-notes --target ${{ steps.commit.outputs.commit_hash }}
        env:
          GH_TOKEN: ${{ github.token }}
