name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build dependencies
        run: mvn dependency:go-offline -q

      - name: Run tests
        run: mvn verify

      - name: Validate documentation
        run: mvn site -DskipTests
